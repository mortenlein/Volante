document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

n            <\u002Fdiv>\n\n            <div style=\"flex:1; min-width:300px; display:grid; grid-template-columns:1fr 1fr; gap:10px;\">\n              <sc-for list=\"{{sysStats}}\" as=\"x\" hint-placeholder-count=\"4\">\n                <div style=\"background:#1d1d22; border:1px solid #303036; border-radius:11px; padding:15px 16px;\">\n                  <div style=\"font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:#6d6a66;\">{{x.label}}<\u002Fdiv>\n                  <div style=\"font-family:'Martian Mono',monospace; font-size:21px; font-weight:700; letter-spacing:-.02em; margin-top:9px; color:#f4f3f1; font-variant-numeric:tabular-nums;\">{{x.value}}<span style=\"font-size:11px; color:#6d6a66; font-family:'JetBrains Mono',monospace; font-weight:400; margin-left:3px;\">{{x.unit}}<\u002Fspan><\u002Fdiv>\n                  <div style=\"font-size:11px; color:#928f8b; margin-top:3px;\">{{x.sub}}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:10px; margin-top:14px;\">\n            <sc-for list=\"{{quickActions}}\" as=\"q\" hint-placeholder-count=\"5\">\n              <button onclick=\"{{q.onClick}}\" style=\"display:flex; align-items:center; gap:11px; height:52px; padding:0 16px; border-radius:11px; background:#1d1d22; border:1px solid #303036; color:#c4c2bf; font-size:12.5px; cursor:pointer; font-family:inherit; text-align:left;\" style-hover=\"border-color:rgba(232,162,61,.45);background:#242429\">\n                <span style=\"color:#e8a23d; display:inline-flex; flex:none;\">{{q.icon}}<\u002Fspan>{{q.label}}\n              <\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n\n          <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(310px,1fr)); gap:14px; margin-top:14px;\">\n            <section style=\"background:#1d1d22; border:1px solid #303036; border-radius:11px; padding:16px;\">\n              <div style=\"display:flex; align-items:center; justify-content:space-between; margin-bottom:12px;\">\n                <span style=\"font-size:11px; letter-spacing:.18em; text-transform:uppercase; color:#928f8b; font-weight:600;\">Active profile<\u002Fspan>\n                <button onclick=\"{{goTune}}\" style=\"background:none; border:none; color:#e8a23d; font-size:11px; cursor:pointer; font-family:inherit;\" style-hover=\"color:#f0b659\">Edit →<\u002Fbutton>\n              <\u002Fdiv>\n              <div style=\"font-family:'Martian Mono',monospace; font-size:18px; font-weight:700; color:#f4f3f1;\">{{selectedProfileName}}<\u002Fdiv>\n              <div style=\"font-size:11.5px; color:#6d6a66; margin-top:4px;\">{{enabledCount}} tweaks active · last applied 2h ago<\u002Fdiv>\n              <div style=\"display:flex; flex-wrap:wrap; gap:6px; margin-top:13px;\">\n                <sc-for list=\"{{activeCats}}\" as=\"c\" hint-placeholder-count=\"4\">\n                  <span style=\"font-size:10px; letter-spacing:.06em; text-transform:uppercase; color:#928f8b; background:#2c2c32; border:1px solid #303036; padding:3px 8px; border-radius:5px;\">{{c.name}} {{c.n}}<\u002Fspan>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fsection>\n\n            <section style=\"background:#1d1d22; border:1px solid #303036; border-radius:11px; padding:16px;\">\n              <div style=\"display:flex; align-items:center; justify-content:space-between; margin-bottom:12px;\">\n                <span style=\"font-size:11px; letter-spacing:.18em; text-transform:uppercase; color:#928f8b; font-weight:600;\">Recommended<\u002Fspan>\n                <span style=\"font-size:11px; color:#6d6a66;\">{{issues}} items<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"display:flex; flex-direction:column; gap:10px;\">\n                <sc-for list=\"{{recommended}}\" as=\"r\" hint-placeholder-count=\"3\">\n                  <div style=\"display:flex; align-items:center; gap:10px;\">\n                    <span style=\"width:6px; height:6px; border-radius:50%; background:#e0b13f; flex:none;\"><\u002Fspan>\n                    <span style=\"font-size:12.5px; color:#c4c2bf; flex:1;\">{{r}}<\u002Fspan>\n                    <svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#6d6a66\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"flex:none;\"><path d=\"M9 6l6 6-6 6\"><\u002Fpath><\u002Fsvg>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fsection>\n\n            <section style=\"background:#1d1d22; border:1px solid #303036; border-radius:11px; padding:16px;\">\n              <div style=\"display:flex; align-items:center; justify-content:space-between; margin-bottom:12px;\">\n                <span style=\"font-size:11px; letter-spacing:.18em; text-transform:uppercase; color:#928f8b; font-weight:600;\">Recent activity<\u002Fspan>\n                <button onclick=\"{{goHistory}}\" style=\"background:none; border:none; color:#e8a23d; font-size:11px; cursor:pointer; font-family:inherit;\" style-hover=\"color:#f0b659\">All →<\u002Fbutton>\n              <\u002Fdiv>\n              <div style=\"display:flex; flex-direction:column;\">\n                <sc-for list=\"{{recentActivity}}\" as=\"a\" hint-placeholder-count=\"3\">\n                  <div style=\"display:flex; align-items:center; gap:10px; padding:8px 0; border-bottom:1px solid #303036;\">\n                    <span style=\"width:6px; height:6px; border-radius:50%; background:{{a.color}}; flex:none;\"><\u002Fspan>\n                    <span style=\"font-size:12px; color:#c4c2bf; flex:1; min-width:0;\">{{a.text}}<\u002Fspan>\n                    <span style=\"font-size:10.5px; color:#55524f; flex:none;\">{{a.when}}<\u002Fspan>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fsection>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{screenIsCheck}}\" hint-placeholder-val=\"{{true}}\">\n      <div data-screen-label=\"System check\" style=\"display:flex; flex-direction:column; flex:1; min-height:0; animation:vfade .22s ease;\">\n        <div style=\"flex:none; padding:24px 30px 18px; display:flex; align-items:flex-start; justify-content:space-between; gap:24px;\">\n          <div style=\"max-width:540px;\">\n            <h1 style=\"margin:0; font-family:'Martian Mono',monospace; font-size:21px; font-weight:700; letter-spacing:-.02em; color:#f4f3f1;\">System check<\u002Fh1>\n            <p style=\"margin:9px 0 0; font-size:12.5px; line-height:1.55; color:#928f8b;\">A read-only look at your setup before tuning. Nothing here is changed — the only optional write is the refresh-rate fix, which you confirm.<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"display:flex; align-items:center; gap:10px; flex:none;\">\n            <div style=\"display:inline-flex; padding:3px; gap:2px; background:#1d1d22; border:1px solid #303036; border-radius:7px;\">\n              <button onclick=\"{{setVA}}\" style=\"border:none; cursor:pointer; font-family:inherit; height:26px; padding:0 11px; font-size:11.5px; letter-spacing:.04em; border-radius:4px; background:{{segBg.A}}; color:{{segFg.A}}; box-shadow:{{segSh.A}};\">Stacked<\u002Fbutton>\n              <button onclick=\"{{setVB}}\" style=\"border:none; cursor:pointer; font-family:inherit; height:26px; padding:0 11px; font-size:11.5px; letter-spacing:.04em; border-radius:4px; background:{{segBg.B}}; color:{{segFg.B}}; box-shadow:{{segSh.B}};\">Dashboard<\u002Fbutton>\n              <button onclick=\"{{setVC}}\" style=\"border:none; cursor:pointer; font-family:inherit; height:26px; padding:0 11px; font-size:11.5px; letter-spacing:.04em; border-radius:4px; background:{{segBg.C}}; color:{{segFg.C}}; box-shadow:{{segSh.C}};\">Focus<\u002Fbutton>\n            <\u002Fdiv>\n            <button onclick=\"{{rerun}}\" style=\"display:flex; align-items:center; gap:7px; height:34px; padding:0 13px; background:#242429; color:#c4c2bf; border:1px solid #3f3f46; border-radius:7px; font-size:12px; letter-spacing:.02em; cursor:pointer; font-family:inherit;\" style-hover=\"background:#2c2c32;border-color:#54545c\">\n              <span style=\"display:inline-flex; animation:{{scanAnim}};\"><svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\"><path d=\"M21 12a9 9 0 1 1-2.64-6.36\"><\u002Fpath><path d=\"M21 3v6h-6\"><\u002Fpath><\u002Fsvg><\u002Fspan>{{rerunLabel}}\n            <\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"flex:1; overflow:auto; padding:0 30px 24px;\">\n\n          <sc-if value=\"{{showHero}}\" hint-placeholder-val=\"{{false}}\">\n          <div style=\"display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:16px;\">\n            <sc-for list=\"{{heroStats}}\" as=\"h\" hint-placeholder-count=\"4\">\n              <div style=\"background:#1d1d22; border:1px solid #303036; border-radius:7px; padding:14px 15px; position:relative; overflow:hidden;\">\n                <div style=\"font-family:'Martian Mono',monospace; font-size:26px; font-weight:700; letter-spacing:-.02em; line-height:1; color:{{h.color}}; font-variant-numeric:tabular-nums;\">{{h.value}}<\u002Fdiv>\n                <div style=\"margin-top:9px; font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:#6d6a66;\">{{h.label}}<\u002Fdiv>\n                <div style=\"font-size:11px; color:#928f8b; margin-top:4px;\">{{h.sub}}<\u002Fdiv>\n                <div style=\"position:absolute; left:0; right:0; bottom:0; height:3px; background:{{h.color}}; opacity:.45;\"><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <sc-if value=\"{{showAllClear}}\" hint-placeholder-val=\"{{false}}\">\n          <div style=\"display:flex; align-items:center; gap:10px; background:rgba(63,192,127,.1); border:1px solid rgba(63,192,127,.28); border-radius:7px; padding:11px 15px; margin-bottom:16px;\">\n            <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#3fc07f\" stroke-width=\"2.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg>\n            <span style=\"font-size:12px; color:#a9dec0;\">{{allClearText}}<\u002Fspan>\n          <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <div style=\"display:grid; gap:14px; align-items:start; grid-template-columns:{{gridCols}};\">\n\n            <sc-if value=\"{{hasMonitors}}\" hint-placeholder-val=\"{{true}}\">\n            <section style=\"background:#1d1d22; border:1px solid #303036; border-radius:11px; box-shadow:0 1px 2px rgba(0,0,0,.4);\">\n              <div style=\"display:flex; align-items:center; gap:10px; padding:13px 16px; border-bottom:1px solid #303036;\">\n                <span style=\"font-size:11px; letter-spacing:.18em; text-transform:uppercase; color:#928f8b; font-weight:600;\">Monitor refresh rate<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"padding:14px 16px; display:flex; flex-direction:column; gap:13px;\">\n                <sc-for list=\"{{monitors}}\" as=\"m\" hint-placeholder-count=\"3\">\n                  <div style=\"display:flex; align-items:center; gap:13px;\">\n                    <span style=\"width:7px; height:7px; border-radius:50%; background:{{m.color}}; flex:none;\"><\u002Fspan>\n                    <div style=\"flex:1; min-width:0;\">\n                      <div style=\"font-size:12.5px; font-weight:600; color:#f4f3f1;\">{{m.gpu}} · {{m.res}}<\u002Fdiv>\n                      <div style=\"font-size:11px; color:#6d6a66; margin-top:2px;\">{{m.note}}<\u002Fdiv>\n                    <\u002Fdiv>\n                    <span style=\"font-size:13px; font-weight:600; color:{{m.color}}; flex:none; font-variant-numeric:tabular-nums;\">{{m.hz}} Hz<\u002Fspan>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fsection>\n            <\u002Fsc-if>\n\n            <section style=\"background:#1d1d22; border:1px solid #303036; border-radius:11px; box-shadow:0 1px 2px rgba(0,0,0,.4);\">\n              <div style=\"display:flex; align-items:center; gap:10px; padding:13px 16px; border-bottom:1px solid #303036;\">\n                <span style=\"font-size:11px; letter-spacing:.18em; text-transform:uppercase; color:#928f8b; font-weight:600;\">GPU driver<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"padding:14px 16px; display:flex; flex-direction:column; gap:15px;\">\n                <sc-for list=\"{{drivers}}\" as=\"d\" hint-placeholder-count=\"2\">\n                  <div style=\"display:flex; align-items:flex-start; gap:13px;\">\n                    <span style=\"width:7px; height:7px; border-radius:50%; background:{{d.color}}; flex:none; margin-top:5px;\"><\u002Fspan>\n                    <div style=\"flex:1; min-width:0;\">\n                      <div style=\"font-size:12.5px; font-weight:600; color:#f4f3f1;\">{{d.name}}<\u002Fdiv>\n                      <div style=\"font-size:11px; color:#6d6a66; margin-top:3px;\">{{d.version}}<\u002Fdiv>\n                      <div style=\"display:inline-flex; align-items:center; gap:5px; height:20px; padding:0 7px; border-radius:5px; background:rgba(224,177,63,.16); color:#e0b13f; font-size:10.5px; letter-spacing:.04em; margin-top:7px;\">Dated {{d.date}} · {{d.ago}}d ago — update available<\u002Fdiv>\n                    <\u002Fdiv>\n                    <button onclick=\"{{d.onGet}}\" style=\"flex:none; height:28px; padding:0 11px; background:#242429; color:#c4c2bf; border:1px solid #3f3f46; border-radius:4px; font-size:11px; letter-spacing:.02em; cursor:pointer; font-family:inherit;\" style-hover=\"background:#2c2c32;border-color:#54545c\">Get driver<\u002Fbutton>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n                <button onclick=\"{{winUpdate}}\" style=\"align-self:flex-start; background:none; border:none; color:#e8a23d; font-size:11.5px; cursor:pointer; font-family:inherit; padding:0;\" style-hover=\"color:#f0b659\">Open Windows Update →<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fsection>\n\n            <sc-if value=\"{{hasPings}}\" hint-placeholder-val=\"{{true}}\">\n            <section style=\"background:#1d1d22; border:1px solid #303036; border-radius:11px; box-shadow:0 1px 2px rgba(0,0,0,.4);\">\n              <div style=\"display:flex; align-items:center; justify-content:space-between; padding:13px 16px; border-bottom:1px solid #303036;\">\n                <span style=\"font-size:11px; letter-spacing:.18em; text-transform:uppercase; color:#928f8b; font-weight:600;\">Ping to Valve / Steam<\u002Fspan>\n                <button onclick=\"{{rerun}}\" style=\"background:none; border:none; color:#e8a23d; font-size:11px; cursor:pointer; font-family:inherit; padding:0;\" style-hover=\"color:#f0b659\">Re-test<\u002Fbutton>\n              <\u002Fdiv>\n              <div style=\"padding:6px 16px 14px; display:flex; flex-direction:column;\">\n                <sc-for list=\"{{pings}}\" as=\"p\" hint-placeholder-count=\"4\">\n                  <div style=\"display:flex; align-items:center; justify-content:space-between; height:36px; border-bottom:1px solid #303036;\">\n                    <span style=\"font-size:12px; color:#c4c2bf;\">{{p.name}}<\u002Fspan>\n                    <span style=\"font-size:12.5px; font-weight:600; color:{{p.color}}; font-variant-numeric:tabular-nums;\">{{p.msText}}{{p.tag}}<\u002Fspan>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n                <div style=\"font-size:10.5px; color:#55524f; margin-top:11px; line-height:1.5;\"> div>\n                <\u002Fsc-for>\n                <div style=\"font-size:10.5px; color:#55524f; margin-top:11px; line-height:1.5;\">'Verify in panel' = the value can't be read safely from outside the driver — open the panel to set it.<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsection>\n            <\u002Fsc-if>\n\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"flex:none; border-top:1px solid #303036; padding:14px 30px; display:flex; align-items:center; justify-content:space-between; background:rgba(22,22,26,.5);\">\n          <span style=\"font-size:11.5px; color:#6d6a66;\">Read-only check · {{ring.score}}/100 ready · {{issues}} quick wins<\u002Fspan>\n          <button onclick=\"{{startTuning}}\" style=\"display:flex; align-items:center; gap:8px; height:36px; padding:0 20px; background:#e8a23d; color:#2a1f0a; border:none; border-radius:7px; font-size:13px; font-weight:600; letter-spacing:.01em; cursor:pointer; font-family:inherit;\" style-hover=\"filter:brightness(1.08)\">Start tuning <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12h13\"><\u002Fpath><path d=\"m13 6 6 6-6 6\"><\u002Fpath><\u002Fsvg><\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{screenIsTuning}}\" hint-placeholder-val=\"{{false}}\">\n      <div data-screen-label=\"Tune\" style=\"display:flex; flex-direction:column; flex:1; min-height:0; animation:vfade .22s ease;\">\n        <div style=\"flex:none; padding:24px 30px 18px;\">\n          <h1 style=\"margin:0; font-family:'Martian Mono',monospace; font-size:21px; font-weight:700; letter-spacing:-.02em; color:#f4f3f1;\">Tune &amp; apply<\u002Fh1>\n          <p style=\"margin:9px 0 0; font-size:12.5px; color:#928f8b;\">Pick a profile, review the tweaks, then apply. A restore point is created first — you can revert anytime.<\u002Fp>\n r>\n          <\u002Fsection>\n          <div style=\"font-size:10.5px; color:#55524f; margin-top:14px; line-height:1.5;\">Restore points are created via Windows System Restore before each apply. Reverting re-runs the inverse of every change in that session.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n    <\u002Fmain>\n  <\u002Fdiv>\n\n  <sc-if value=\"{{hasToast}}\" hint-placeholder-val=\"{{false}}\">\n  <div style=\"position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:#242429; border:1px solid #54545c; color:#f4f3f1; font-size:12.5px; padding:11px 18px; border-radius:7px; box-shadow:0 24px 70px rgba(0,0,0,.6); animation:vrise .2s ease;\">{{toastMsg}}<\u002Fdiv>\n  <\u002Fsc-if>\n\n  \n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;$preview&quot;: { &quot;width&quot;: 1320, &quot;height&quot;: 880 },\n  &quot;defaultVariant&quot;: { &quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;A&quot;, &quot;B&quot;, &quot;C&quot;], &quot;default&quot;: &quot;A&quot;, &quot;tsType&quot;: &quot;'A'|'B'|'C'&quot; },\n  &quot;startScreen&quot;: { &quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;home&quot;, &quot;check&quot;, &quot;tuning&quot;, &quot;monitor&quot;, &quot;library&quot;, &quot;history&quot;], &quot;default&quot;: &quot;home&quot;, &quot;tsType&quot;: &quot;string&quot; },\n  &quot;simulatedScore&quot;: { &quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: 78, &quot;min&quot;: 0, &quot;max&quot;: 100, &quot;tsType&quot;: &quot;number&quot; }\n}\">\nclass Component extends DCLogic {\n  state = (() => {\n    const p = this.props || {};\n    return {\n      screen: p.startScreen || 'home',\n      variant: p.defaultVariant || 'A',\n      profile: 'cs2',\n      scanning: false,\n      toastMsg: '',\n      applyIndex: -1,\n      pings: [\n        { name: 'Steam (valvesoftware.com)', ms: 53 },\n        { name: 'Steam store', ms  ping: 27, power: 264,\n        cores: [44, 38, 52, 31, 47, 29, 61, 35],\n        hist: Array.from({ length: 48 }, (_, i) => 330 + Math.round(Math.sin(i / 3) * 22 + (Math.random() - 0.5) * 18)),\n      },\n    };\n  })();\n\n  componentDidMount() {\n    this._mt = setInterval(() => {\n      if (this.state.screen !== 'monitor') return;\n      this.setState(s => {\n        const j = (v, lo, hi, amt) => Math.max(lo, Math.min(hi, v + (Math.random() - 0.5) * amt));\n        const m = s.mon;\n        const fps = Math.round(j(m.fps, 250, 360, 26));\n        const hist = m.hist.slice(1).concat(fps);\n        return {\n          mon: {\n            ...m,\n            fps,\n            frameMs: +(1000 / fps).toFixed(1),\n            cpu: Math.round(j(m.cpu, 28, 72, 14)),\n            cpuTemp: Math.round(j(m.cpuTemp, 52, 72, 4)),\n            gpu: Math.round(j(m.gpu, 58, 96, 12)),\n            gpuTemp: Math.round(j(m.gpuTemp, 58, 76, 4)),\n            gpuClock: Math.round(j(m.gpuClock, 2520, 2730, 60)),\n            vram: +j(m.vram, 7.2, 10.4, .6).toFixed(1),\n            ping: Math.round(j(m.ping, 22, 38, 5)),\n            power: Math.round(j(m.power, 230, 310, 24)),\n            cores: m.cores.map(c => Math.round(j(c, 18, 96, 30))),\n            hist,\n          },\n        };\n      });\n    }, 700);\n  }\n  componentWillUnmount() { if (this._t) clearInterval(this._t); if (this._mt) clearInterval(this._mt); clearTimeout(this._toast); }\n\n  go(screen) { this.setState({ screen }); }\n  setVariant(v) { this.setState({ variant: v }); }\n  selectProfile(id) { this.setState({ profile: id }); }\n  toggleTweak(id) { this.setState(s => ({ tweaks: s.tweaks.map(t => t.id === id ? { ...t, enabled: !t.enabled } : t) })); }\n  toast(msg) { this.setState({ toastMsg: msg }); clearTimeout(this._toast); this._toast = setTimeout(() => this.setState({ toastMsg: '' }), 2200); }\n  rerun() {\n    if (this.state.scanning) return;\n    this.setState({ scanning: true });\n    setTimeout(() => {\n      this.setState(s => ({ scanning: false, pings: s.pings.map(p => ({ ...p, ms: Math.max(18, p.ms + Math.round((Math.random() - 0.5) * 10)) })) }));\n      this.toast('Checks refreshed');\n    }, 1500);\n  }\n  applyTweaks() {\n    const total = this.state.tweaks.filter(t => t.enabled).length;\n    if (!total) { this.toast('Select at least one tweak'); return; }\n    this.setState({ screen: 'applying', applyIndex: 0 });\n    if (this._t) clearInterval(this._t);\n    this._t = setInterval(() => {\n      this.setState(s => {\n        const next = s.applyIndex + 1;\n        if (next > total) { clearInterval(this._t); setTimeout(() => this.setState({ screen: 'done', applyIndex: -1 }), 500); return {}; }\n        return { applyIndex: next };\n      });\n    }, 480);\n  }\n  revert() { this.setState({ screen: 'check' }); this.toast('Tweaks reverted — system restored from restore point'); }\n\n  ic(name) {\n    const P = {\n      home: 'M4 11l8-7 8 7 M6 10v9h12v-9',\n      check: 'M12 3l7 3v5c0 4.5-3 7.5-7 9-4-1.5-7-4.5-7-9V6z M9 12l2 2 4-4',\n      tune: 'M4 7h10 M18 7h2 M4 12h4 M12 12h8 M4 17h12 M18 17h2 M14 5v4 M8 10v4 M16 15v4',\n      monitor: 'M3 12h4l2 6 4-14 2 8h6',\n      games: 'M7 9h2 M8 8v2 M15 9h.01 M17 11h.01 M6 6h12a3 3 0 013 3l-1 6a3 3 0 01-3 2.5c-1.5 0-2.2-1-3-2h-6c-.8 1-1.5 2-3 2A3 3 0 013 15L2 9a3 3 0 013-3z',\n      history: 'M3 12a9 9 0 1 0 3-6.7L3 8 M3 4v4h4 M12 8v4l3 2',\n    };\n    return React.createElement('svg', { width: 16, height: 16, viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: 1.7, strokeLinecap: 'round', strokeLinejoin: 'round' }, React.createElement('path', { d: P[name] }));\n  }\n\n  renderVals() {\n    const s = this.state;\n    const CC = { good: '#3fc07f', warn: '#e0b13f', verify: '#6d6a66', bad: '#df5340', accent: '#e8a23d', accentInk: '#2a1f0a', ct: '#5fa1df' };\n\n    const profDefs = [\n      { id: 'cs2', name: 'Counter-Strike 2', tag: 'FPS · competitive' },\n      { id: 'valorant', name: 'Valorant', ta  ? '1' : '.5',\n        onRestore: () => { if (active) this.revert(); },\n      };\n    };\n    const history = [\n      hRow('Today', '18:42', 'Counter-Strike 2 tune', 'Game Mode, GPU scheduling, +7 more', 9, 'Active', true),\n      hRow('Today', '16:10', 'Network latency pass', 'Throttling index, Nagle disabled', 2, 'Superseded', false),\n      hRow('Yesterday', '21:30', 'Valorant tune', 'Power plan, FSO, mouse accel', 6, 'Reverted', false),\n      hRow('Mar 18', '14:05', 'Baseline snapshot', 'Pre-Volante system state', 0, 'Superseded', false),\n      hRow('Mar 15', '09:22', 'All-games system tune', 'Visual effects, background apps', 8, 'Superseded', false),\n    ];\n\n    return {\n      ctxLabel, pipelineLabel: 'pipeline idle',\n      nav, ring, issues,\n      steps: [],\n      monitors, drivers, pings, cp,\n      hasMonitors: monitors.length > 0, hasPings: pings.length > 0, hasCp: cp.length > 0,\n      gridCols: s.variant === 'B' ? 'repeat(2, minmax(0,1fr))' : 'minmax(0,1fr)',\n      showHero: s.variant === 'B', showAllClear: isFocus,\n      allClearText: 'All clear: 3 displays at max refresh · Steam routing healthy · 6 panel values to verify.',\n      heroStats, segBg, segFg, segSh,\n      setVA: () => this.setVariant('A'), setVB: () => this.setVariant('B'), setVC: () => this.setVariant('C'),\n      rerun: () => this.rerun(), rerunLabel: s.scanning ? 'Scanning…' : 'Re-run checks',\n      scanAnim: s.scanning ? 'vspin .8s linear infinite' : 'none',\n      winUpdate: () => this.toast('Opening Windows Update…'),\n      controlPanel: () => this.toast('Opening NVIDIA Control Panel…'),\n      advanced: () => this.toast('Advanced mode — manual tweak editor'),\n      benchmark: () => this.toast('Launching benchmark…'),\n      startTuning: () => this.go('tuning'),\n      goCheck: () => this.go('check'), goTune: () => this.go('tuning'),\n      goMonitor: () => this.go('monitor'), goHistory: () => this.go('history'),\n      apply: () => this.applyTweaks(), revert: () =>
